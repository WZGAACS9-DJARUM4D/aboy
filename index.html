<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Navigasi Premium - ABOY</title>
    <!-- Font & Ikon Premium Deep Sharp -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Reset Dasar */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        /* Ultimate Liquid Gold Background - Super Jelas & Terang */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: url('https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTR3Zms0aXo4YXV4ZXRzdDZlMDNpeTd3MWZua293bG5uM3dmcWU1bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Zx1iGlaR5Hy4CV0vHD/giphy.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 24px;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Overlay Super Jernih */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(5,5,10,0.4) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Container Menu Utama */
        .sidebar { width: 100%; max-width: 390px; position: relative; z-index: 2; }

        /* Header Judul */
        .menu-header { text-transform: uppercase; letter-spacing: 4px; font-size: 11px; color: #fef08a; font-weight: 800; margin-bottom: 24px; padding-left: 6px; display: flex; align-items: center; text-shadow: 0 0 12px rgba(251, 191, 36, 1), 0 3px 6px rgba(0,0,0,0.95); }
        .menu-header::before { content: ""; width: 30px; height: 3px; background: linear-gradient(90deg, #fef08a, rgba(251, 191, 36, 0.2), transparent); margin-right: 14px; border-radius: 4px; box-shadow: 0 0 10px #fbbf24; }

        /* Tombol Utama */
        .menu-item { background: linear-gradient(135deg, rgba(12, 12, 18, 0.65) 0%, rgba(6, 6, 10, 0.75) 100%); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.25); width: 100%; padding: 18px 24px; margin-bottom: 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 15px; font-weight: 600; color: #ffffff; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); text-align: left; outline: none; position: relative; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8); text-shadow: 0 2px 4px rgba(0, 0, 0, 0.95), 0 0 10px rgba(0, 0, 0, 0.5); }
        .menu-item:hover { color: #ffffff; background: linear-gradient(135deg, rgba(25, 25, 35, 0.8) 0%, rgba(10, 10, 15, 0.9) 100%); border-color: rgba(251, 191, 36, 0.8); border-top-color: #ffffff; box-shadow: 0 0 30px rgba(251, 191, 36, 0.45), 0 0 15px rgba(217, 119, 6, 0.3), inset 0 0 12px rgba(251, 191, 36, 0.2); transform: translateY(-4px) scale(1.01); }
        
        /* Efek Active */
        .menu-item.active { background: linear-gradient(135deg, #b45309 0%, #fef08a 50%, #d97706 100%); background-size: 200% auto; color: #000000; border: 1px solid rgba(255,255,255,0.4); font-weight: 800; text-shadow: none; animation: shineGradient 4s infinite linear, activeNeonLight 2.5s infinite alternate ease-in-out; }
        
        @keyframes shineGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes activeNeonLight { 0% { box-shadow: 0 5px 20px rgba(217, 119, 6, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.5); } 100% { box-shadow: 0 18px 45px rgba(251, 191, 36, 1), inset 0 1px 5px rgba(255, 255, 255, 0.7); } }

        /* Submenu & Lainnya */
        .submenu { background: rgba(4, 4, 8, 0.92); backdrop-filter: blur(20px); margin: -10px 10px 18px 20px; border-radius: 0 0 20px 20px; border-left: 3px solid #fbbf24; max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .submenu.show { max-height: 500px; }
        .submenu a { display: flex; align-items: center; padding: 15px 22px; text-decoration: none; color: #ffffff; font-size: 14px; font-weight: 600; transition: all 0.3s ease; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .submenu a i { margin-right: 14px; color: #fbbf24; }
        
        /* Ikon & Arrow */
        .icon-box { margin-right: 16px; width: 24px; text-align: center; }
        .menu-item:not(.active) .icon-box { color: #d8b4fe; filter: drop-shadow(0 0 8px rgba(168, 85, 247, 1)); }
        .arrow { font-size: 12px; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); color: #cbd5e1; }
        .active-arrow { transform: rotate(180deg); color: #fbbf24 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-header">Main Dashboard</div>

    <!-- Tombol Laporan Utama -->
    <button class="menu-item" onclick="toggleMenu('laporanMenu', this)">
        <span><i class="fas fa-chart-pie icon-box"></i> Laporan Utama</span>
        <i class="fas fa-chevron-down arrow"></i>
    </button>
    <div id="laporanMenu" class="submenu">
        <a href="#"><i class="fas fa-user-edit"></i> Ganti Data Rekening</a>
        <a href="#"><i class="fas fa-user-lock"></i> Laporan Lock</a>
        <a href="#"><i class="fas fa-font"></i> Spasi Nama Rekening</a>
        <a href="#"><i class="fas fa-shield-halved"></i> Lock Dual User ID</a>
    </div>

    <!-- Tombol Aktif VIP -->
    <button class="menu-item active" onclick="window.open('https://711-hub.github.io/opr/mahjongevent/', '_blank')">
        <span><i class="fas fa-crown icon-box"></i> Bonus Mahjong Ways</span>
        <i class="fas fa-star"></i>
    </button>

    <!-- Tombol Cek Data CRM -->
    <button class="menu-item" onclick="window.open('https://dataaboy.github.io/CRM/', '_blank')">
        <span><i class="fas fa-database icon-box"></i> Cek Data CRM</span>
    </button>

    <!-- Tombol Transaksi Lengkap Rekapan -->
    <button class="menu-item" onclick="window.open('https://dataaboy.github.io/Transaksi-Lengkap-Djarum4D/', '_blank')">
        <span><i class="fas fa-cog icon-box"></i> Transaksi Lengkap Rekapan</span>
    </button>

    <!-- Tombol RUMUS WD FLOP (Baru) -->
    <button class="menu-item" onclick="window.open('https://dataaboy.github.io/VVIP-KASIR-DJARUM4D/', '_blank')">
        <span><i class="fas fa-calculator icon-box"></i> Rumus WD Flop</span>
    </button>
</div>

<script>
    function toggleMenu(id, btn) {
        const menu = document.getElementById(id);
        const icon = btn.querySelector('.arrow');
        menu.classList.toggle('show');
        if (icon) icon.classList.toggle('active-arrow');
        btn.style.transform = "scale(0.96) translateY(0px)";
        setTimeout(() => { btn.style.transform = ""; }, 140);
    }
</script>

</body>
</html>
